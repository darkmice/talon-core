name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: talon-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-15
            name: talon-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: talon-windows-amd64
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: talon-windows-arm64
          - target: loongarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-loongarch64
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            name: talon-linux-riscv64
            use_cross: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross (Docker-based cross-compilation)
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cargo)
        if: matrix.use_cross != true
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/talon dist/${{ matrix.name }} 2>/dev/null || true
          cp target/${{ matrix.target }}/release/talon-cli dist/${{ matrix.name }}-cli 2>/dev/null || true
          cp target/${{ matrix.target }}/release/talon-tui dist/${{ matrix.name }}-tui 2>/dev/null || true
          cd dist && tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}* && cd ..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/talon.exe dist/${{ matrix.name }}.exe -ErrorAction SilentlyContinue
          Copy-Item target/${{ matrix.target }}/release/talon-cli.exe dist/${{ matrix.name }}-cli.exe -ErrorAction SilentlyContinue
          Copy-Item target/${{ matrix.target }}/release/talon-tui.exe dist/${{ matrix.name }}-tui.exe -ErrorAction SilentlyContinue
          cd dist; tar czf ${{ matrix.name }}.tar.gz ${{ matrix.name }}*; cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
