name: Publish Docs

on:
  push:
    branches: [main]
    paths:
      - 'packages/docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Checkout talon-docs
        uses: actions/checkout@v4
        with:
          repository: darkmice/talon-docs
          token: ${{ secrets.TALON_BIN_TOKEN }}
          path: talon-docs
          ref: gh-pages

      - name: Sync built docs to talon-docs
        run: |
          # 确保构建产物存在
          if [ ! -d "packages/docs/.vitepress/dist" ]; then
            echo "Error: dist directory not found!"
            exit 1
          fi

          cd talon-docs
          # 清理旧文件，但保留核心维护文件和目录：
          # 1. 所有以 "." 开头的目录/文件 (.git, .cursor, .gemini 等)
          # 2. 手动维护的技能目录 (skills)
          # 3. 核心说明文档 (README.md, LICENSE, llms-full.txt, llms.txt)
          find . -maxdepth 1 \
            ! -name '.' \
            ! -name '.*' \
            ! -name 'skills' \
            ! -name 'README.md' \
            ! -name 'LICENSE' \
            ! -name 'llms-full.txt' \
            ! -name 'llms.txt' \
            -exec rm -rf {} +

          # 复制构建产物 (使用 -a 保持权限并包含可能的隐藏文件)
          cp -a ../packages/docs/.vitepress/dist/. .

          # 提交推送
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to docs"
          else
            git commit -m "docs: sync from talon ${GITHUB_SHA::8}"
            git push origin gh-pages
          fi
